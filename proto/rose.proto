syntax = "proto3";

package rose.v1;
option go_package = "github.com/rmmh/rose/proto";

service Rose {
  // File operations
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Close(CloseRequest) returns (CloseResponse);
  rpc Getattr(GetattrRequest) returns (GetattrResponse);
  rpc Unlink(UnlinkRequest) returns (UnlinkResponse);
  rpc Rename(RenameRequest) returns (RenameResponse);
  rpc CreateSnapshot(CreateSnapshotRequest) returns (CreateSnapshotResponse);
  rpc DeleteSnapshot(DeleteSnapshotRequest) returns (DeleteSnapshotResponse);
  rpc OpenSnapshot(OpenSnapshotRequest) returns (OpenResponse);

  // Virtual Log operations
  rpc MakeVlog(MakeVlogRequest) returns (MakeVlogResponse);
  rpc WriteVlog(WriteVlogRequest) returns (WriteVlogResponse);
  rpc ReadVlog(ReadVlogRequest) returns (ReadVlogResponse);
  rpc CommitVlog(CommitVlogRequest) returns (CommitVlogResponse);

  // Physical Log operations
  rpc MakePlog(MakePlogRequest) returns (MakePlogResponse);
  rpc WritePlog(WritePlogRequest) returns (WritePlogResponse);
  rpc ReadPlog(ReadPlogRequest) returns (ReadPlogResponse);
  rpc CommitPlog(CommitPlogRequest) returns (CommitPlogResponse);

  // Disk management operations. Long-running operations return a job that
  // reports progress while data movement continues concurrently with I/O.
  rpc AddDisk(AddDiskRequest) returns (AddDiskResponse);
  rpc RemoveDisk(RemoveDiskRequest) returns (MaintenanceJobResponse);
  rpc ReplaceDisk(ReplaceDiskRequest) returns (MaintenanceJobResponse);
  rpc StartReprotect(StartReprotectRequest) returns (MaintenanceJobResponse);
  rpc StartRebalance(StartRebalanceRequest) returns (MaintenanceJobResponse);
  rpc GetMaintenanceJob(GetMaintenanceJobRequest) returns (GetMaintenanceJobResponse);
}

// File requests
message OpenRequest {
  string path = 1;
  string operation_key = 2;
}

message OpenResponse {
  int64 handle = 1;
  int64 acknowledged_offset = 2;
}

message WriteRequest {
  int64 handle = 1;
  bytes buffer = 2;
  int64 offset = 3;
}

message WriteResponse {
  int64 acknowledged_offset = 1;
}

message ReadRequest {
  int64 handle = 1;
  int64 offset = 2;
  int64 length = 3;
}

message ReadResponse {
  bytes buffer = 1;
}

message GetattrRequest {
  string path = 1;
}

message GetattrResponse {
  int64 size = 1;
}

message UnlinkRequest {
  string path = 1;
}

message UnlinkResponse {
}

message RenameRequest {
  string old_path = 1;
  string new_path = 2;
}

message RenameResponse {
}

message CreateSnapshotRequest {
  string name = 1;
}

message CreateSnapshotResponse {
  uint64 snapshot_id = 1;
}

message DeleteSnapshotRequest {
  uint64 snapshot_id = 1;
}

message DeleteSnapshotResponse {
}

message OpenSnapshotRequest {
  uint64 snapshot_id = 1;
  string path = 2;
}

message CloseRequest {
  int64 handle = 1;
  // Client-generated, stable across retries.  Repeating Close with the same
  // key returns the outcome of the original write rather than appending again.
  string idempotency_key = 2;
}

message CloseResponse {
}

// Vlog requests
message MakeVlogRequest {
  string protection_scheme = 1;
  int32 data_shards = 2;
  int32 parity_shards = 3;
}

message MakeVlogResponse {
  uint32 vlog_id = 1;
}

message WriteVlogRequest {
  uint32 vlog_id = 1;
  int64 txn_id = 2;
  bytes buffer = 3;
}

message WriteVlogResponse {
  uint32 offset = 1;
}

message ReadVlogRequest {
  uint32 vlog_id = 1;
  uint32 offset = 2;
  uint32 length = 3;
}

message ReadVlogResponse {
  bytes buffer = 1;
}

message CommitVlogRequest {
  int64 txn_id = 1;
}

message CommitVlogResponse {
}

// Plog requests
message MakePlogRequest {
  uint32 disk_id = 1;
}

message MakePlogResponse {
  uint32 plog_id = 1;
}

message WritePlogRequest {
  uint32 plog_id = 1;
  int64 txn_id = 2;
  int64 lock_id = 3;
  bytes buffer = 4;
}

message WritePlogResponse {
  uint32 offset = 1;
}

message ReadPlogRequest {
  uint32 plog_id = 1;
  uint32 offset = 2;
  uint32 length = 3;
}

message ReadPlogResponse {
  bytes buffer = 1;
}

message CommitPlogRequest {
  int64 txn_id = 1;
}

message CommitPlogResponse {
}

// Disk management requests
message AddDiskRequest {
  uint32 disk_id = 1;
  uint32 node_id = 2;
  uint64 total_bytes = 3;
}

message AddDiskResponse {
}

message RemoveDiskRequest {
  uint32 disk_id = 1;
}

message ReplaceDiskRequest {
  uint32 old_disk_id = 1;
  uint32 new_disk_id = 2;
  uint32 node_id = 3;
  uint64 total_bytes = 4;
}

message StartReprotectRequest {
  uint32 disk_id = 1;
}

message StartRebalanceRequest {
}

message MaintenanceJobResponse {
  uint64 job_id = 1;
}

message GetMaintenanceJobRequest {
  uint64 job_id = 1;
}

enum MaintenanceJobState {
  MAINTENANCE_JOB_STATE_UNSPECIFIED = 0;
  MAINTENANCE_JOB_STATE_RUNNING = 1;
  MAINTENANCE_JOB_STATE_COMPLETED = 2;
  MAINTENANCE_JOB_STATE_FAILED = 3;
}

message GetMaintenanceJobResponse {
  uint64 job_id = 1;
  MaintenanceJobState state = 2;
  uint64 completed_bytes = 3;
  uint64 total_bytes = 4;
}
