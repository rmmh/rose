syntax = "proto3";

package rose.v1;
option go_package = "github.com/rmmh/rose/proto";

service Rose {
  // File operations
  rpc Open(OpenRequest) returns (OpenResponse);
  rpc Write(WriteRequest) returns (WriteResponse);
  rpc Read(ReadRequest) returns (ReadResponse);
  rpc Close(CloseRequest) returns (CloseResponse);
  rpc Getattr(GetattrRequest) returns (GetattrResponse);

  // Virtual Log operations
  rpc MakeVlog(MakeVlogRequest) returns (MakeVlogResponse);
  rpc WriteVlog(WriteVlogRequest) returns (WriteVlogResponse);
  rpc ReadVlog(ReadVlogRequest) returns (ReadVlogResponse);
  rpc CommitVlog(CommitVlogRequest) returns (CommitVlogResponse);

  // Physical Log operations
  rpc MakePlog(MakePlogRequest) returns (MakePlogResponse);
  rpc WritePlog(WritePlogRequest) returns (WritePlogResponse);
  rpc ReadPlog(ReadPlogRequest) returns (ReadPlogResponse);
  rpc CommitPlog(CommitPlogRequest) returns (CommitPlogResponse);
}

// File requests
message OpenRequest {
  string path = 1;
}

message OpenResponse {
  int64 handle = 1;
}

message WriteRequest {
  int64 handle = 1;
  bytes buffer = 2;
}

message WriteResponse {
}

message ReadRequest {
  int64 handle = 1;
  int64 offset = 2;
  int64 length = 3;
}

message ReadResponse {
  bytes buffer = 1;
}

message GetattrRequest {
  string path = 1;
}

message GetattrResponse {
  int64 size = 1;
}

message CloseRequest {
  int64 handle = 1;
}

message CloseResponse {
}

// Vlog requests
message MakeVlogRequest {
  string protection_scheme = 1;
  int32 data_shards = 2;
  int32 parity_shards = 3;
}

message MakeVlogResponse {
  uint32 vlog_id = 1;
}

message WriteVlogRequest {
  uint32 vlog_id = 1;
  int64 txn_id = 2;
  bytes buffer = 3;
}

message WriteVlogResponse {
  uint32 offset = 1;
}

message ReadVlogRequest {
  uint32 vlog_id = 1;
  uint32 offset = 2;
  uint32 length = 3;
}

message ReadVlogResponse {
  bytes buffer = 1;
}

message CommitVlogRequest {
  int64 txn_id = 1;
}

message CommitVlogResponse {
}

// Plog requests
message MakePlogRequest {
  uint32 disk_id = 1;
}

message MakePlogResponse {
  uint32 plog_id = 1;
}

message WritePlogRequest {
  uint32 plog_id = 1;
  int64 txn_id = 2;
  int64 lock_id = 3;
  bytes buffer = 4;
}

message WritePlogResponse {
  uint32 offset = 1;
}

message ReadPlogRequest {
  uint32 plog_id = 1;
  uint32 offset = 2;
  uint32 length = 3;
}

message ReadPlogResponse {
  bytes buffer = 1;
}

message CommitPlogRequest {
  int64 txn_id = 1;
}

message CommitPlogResponse {
}
